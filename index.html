<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.coingecko.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests"
  />
  <title>Crypto Insiders — вход</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="blob blob--1"></div>
    <div class="blob blob--2"></div>
    <div class="blob blob--3"></div>
  </div>

  <div class="gate" id="gate-root">
    <form id="auth-form" class="auth-form card card--auth" novalidate>
      <label class="visually-hidden" for="password">Пароль</label>
      <input
        type="password"
        id="password"
        class="auth-input"
        name="password"
        autocomplete="current-password"
        placeholder="Пароль"
        required
      />
      <p class="auth-error" id="auth-error" hidden>Неверный пароль</p>
      <button type="submit" class="btn">Войти</button>
    </form>
  </div>

  <script>
    window.__CRYPTO_INSIDERS_GATE__ = window.__CRYPTO_INSIDERS_GATE__ || {
      sessionKey: "site_landing_unlocked",
      password: "",
    };
  </script>
  <script src="js/gate-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
